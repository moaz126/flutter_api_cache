name: flutter_api_cache
description: "A powerful, lightweight API response caching solution for Flutter with TTL, offline-first support, stale-while-revalidate, and Dio interceptor."
version: 0.0.1
homepage: https://github.com/moaz126/flutter_api_cache
repository: https://github.com/moaz126/flutter_api_cache
issue_tracker: https://github.com/moaz126/flutter_api_cache/issues
topics:
  - cache
  - api
  - dio
  - offline-first
  - http

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
